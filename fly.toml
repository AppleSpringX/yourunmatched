# Fly.io app config. App name is set on first `fly launch` — fix it then if needed.
app = 'unmatched-club'
primary_region = 'fra'

[build]
  # Uses the Dockerfile in this repo

[env]
  DB_PATH = '/data/unmatched.db'
  BOT_MODE = 'polling'

# Persistent disk for SQLite. Survives deploys and restarts.
[mounts]
  source = 'unmatched_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: bot polling needs a live process. No scale-to-zero.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks.health]]
      grace_period = '10s'
      interval = '30s'
      method = 'GET'
      path = '/healthz'
      timeout = '5s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
